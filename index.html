<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #1e3a2f;
  --sage: #4a7c59;
  --sage-light: #7aab89;
  --mint: #c8e6d0;
  --mint-pale: #eaf5ed;
  --gold: #c9a84c;
  --gold-light: #f0dfa0;
  --gold-pale: #fdf8ec;
  --cream: #fdfbf6;
  --white: #ffffff;
  --mist: #f2ede4;
  --ink: #1a1a2e;
  --ink-mid: #4a5e47;
  --ink-light: #7a9478;
  --border: rgba(30,58,47,0.11);
  --sh-sm: 0 2px 10px rgba(30,58,47,0.07);
  --sh-md: 0 6px 24px rgba(30,58,47,0.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--cream);
  font-family: 'Jost', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 60px;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(74,124,89,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(201,168,76,0.05) 0%, transparent 55%);
}

/* ── HEADER BLOCK ── */
.header-block {
  background: var(--forest);
  position: relative;
  overflow: hidden;
}
.header-block::before {
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 25% 60%, rgba(201,168,76,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 40%, rgba(74,124,89,0.18) 0%, transparent 55%);
  pointer-events:none;
}

/* title row */
.hero-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 0;
  position: relative;
  gap: 12px;
}
.hero-left {}
.hero-eyebrow {
  font-size: 0.58rem;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 4px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.7rem, 5vw, 2.4rem);
  font-weight: 700;
  color: white;
  line-height: 1;
  letter-spacing: -0.3px;
}
.hero-title em { font-style: italic; color: var(--gold-light); }

/* weather inline */
.weather-inline {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 8px 12px;
  flex-shrink: 0;
  min-width: 130px;
}
.wi-icon { font-size: 1.3rem; line-height: 1; }
.wi-temp {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: white;
  line-height: 1;
}
.wi-desc {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.45);
  text-transform: capitalize;
  margin-top: 1px;
  letter-spacing: 0.2px;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wi-badge {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border-radius: 99px;
  padding: 2px 7px;
  white-space: nowrap;
  margin-top: 3px;
  display: inline-block;
}
.court-great { background:rgba(126,232,162,0.2); color:#7ee8a2; border:1px solid rgba(126,232,162,0.3); }
.court-ok    { background:rgba(240,223,160,0.18); color:#f0dfa0; border:1px solid rgba(240,223,160,0.28); }
.court-bad   { background:rgba(255,110,110,0.15); color:#ff9a9a; border:1px solid rgba(255,110,110,0.22); }
.wi-loading  { font-size:0.65rem; color:rgba(255,255,255,0.3); padding:4px 0; }

/* stat row */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  border-top: 1px solid rgba(255,255,255,0.07);
  margin-top: 16px;
  position: relative;
}
.stat {
  text-align: center;
  padding: 12px 8px 14px;
  border-right: 1px solid rgba(255,255,255,0.07);
}
.stat:last-child { border-right: none; }
.stat-label {
  font-size: 0.56rem;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  font-weight: 600;
  margin-bottom: 3px;
}
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: white;
  transition: all 0.3s;
}
.stat-val.green { color: #7ee8a2; }
.stat-val.gold  { color: var(--gold-light); }

/* progress strip */
.progress-strip { height: 3px; background: rgba(255,255,255,0.08); }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage-light), var(--gold));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  width: 0%;
}

/* ── TABS ── */
.tab-wrap {
  display: flex;
  max-width: 700px;
  margin: 0 auto;
  padding: 16px 16px 0;
  gap: 8px;
}
.tab-btn {
  flex: 1;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 9px 8px;
  font-family: 'Jost', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.8px;
  color: var(--ink-light);
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--sh-sm);
}
.tab-btn:hover { background: var(--mint-pale); color: var(--forest); }
.tab-btn.active { background: var(--forest); color: white; border-color: var(--forest); }

/* ── CONTENT ── */
.content { max-width: 700px; margin: 0 auto; padding: 16px 16px 0; }
.view { display: none; }
.view.active { display: block; }

/* ── GROUP CARDS ── */
.group-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--sh-md);
  margin-bottom: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  animation: riseIn 0.45s cubic-bezier(.4,0,.2,1) both;
}
@keyframes riseIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.group-card:nth-child(1){animation-delay:.03s}
.group-card:nth-child(2){animation-delay:.07s}
.group-card:nth-child(3){animation-delay:.11s}
.group-card:nth-child(4){animation-delay:.15s}
.group-card:nth-child(5){animation-delay:.19s}
.group-card:nth-child(6){animation-delay:.23s}

.group-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--mint-pale);
  gap: 10px;
}
.group-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--forest);
  line-height: 1.2;
}
.group-meta {
  font-size: 0.68rem;
  color: var(--ink-light);
  margin-top: 3px;
  line-height: 1.6;
}
.group-meta span { margin-right: 8px; }
.group-meta span::before { content:'· '; }
.group-meta span:first-child::before { content:''; }
.group-totals { text-align: right; flex-shrink: 0; }
.group-pkg-amt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--forest);
}
.group-pkg-label { font-size:0.58rem; color:var(--ink-light); text-transform:uppercase; letter-spacing:1px; margin-top:1px; }
.group-collected { font-size:0.7rem; font-weight:600; color:var(--sage); margin-top:4px; }

/* package selector */
.pkg-selector {
  display: flex;
  gap: 6px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--mint-pale);
  align-items: center;
  flex-wrap: wrap;
  background: var(--gold-pale);
}
.pkg-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--ink-light);
  letter-spacing: 1px;
  margin-right: 2px;
}
.pkg-btn {
  border: 2px solid var(--gold);
  background: white;
  border-radius: 8px;
  padding: 6px 13px;
  font-size: 0.78rem;
  font-weight: 600;
  color: #7a5c00;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Jost', sans-serif;
}
.pkg-btn:hover { background: var(--gold-light); transform: scale(1.05); }
.pkg-btn.active { background: var(--forest); color: white; border-color: var(--forest); font-weight: 700; }

/* student rows */
.students { padding: 4px 0; }
.student-row { border-bottom: 1px solid rgba(30,58,47,0.04); }
.student-row:last-child { border-bottom: none; }

.student-main {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.student-main:hover { background: var(--mint-pale); }
.student-row.paid-row .student-main { background: var(--mint-pale); }
.student-row.paid-row .student-main:hover { background: #d9efdf; }

.check-box {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 2px solid var(--mint);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  background: white;
}
.check-box.checked { background: var(--forest); border-color: var(--forest); }
.check-box svg { display: none; }
.check-box.checked svg { display: block; }

.student-info { flex: 1; min-width: 0; }
.student-name { font-size: 0.86rem; font-weight: 500; color: var(--ink); }
.student-balance { font-size: 0.67rem; color: var(--ink-light); margin-top: 1px; }

.paid-tag {
  font-size: 0.58rem; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; background: var(--mint-pale);
  color: var(--forest); border-radius: 4px; padding: 2px 6px;
  border: 1px solid var(--mint); opacity: 0; transition: opacity 0.2s;
  flex-shrink: 0;
}
.student-row.paid-row .paid-tag { opacity: 1; }

.student-amt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 700; color: var(--forest);
  flex-shrink: 0;
}
.student-row.paid-row .student-amt,
.student-row.paid-row .student-name { color: var(--sage); }

/* week dots */
.group-weeks {
  display: flex; gap: 5px; padding: 8px 16px 12px;
  align-items: center; border-top: 1px solid var(--mint-pale);
}
.gw-label {
  font-size: 0.58rem; letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--ink-light); font-weight: 600; margin-right: 4px;
}
.week-pip {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--mist); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; font-weight: 700; color: var(--ink-light);
}
.week-pip.done { background: var(--forest); border-color: var(--forest); color: white; }
.week-pip.disabled { opacity: 0.25; }

/* ── WEEKLY VIEW ── */
.week-nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; background: var(--white);
  border-radius: 14px; padding: 12px 16px;
  box-shadow: var(--sh-sm); border: 1px solid var(--border);
}
.wn-btn {
  width: 34px; height: 34px; border-radius: 9px;
  border: 1.5px solid var(--border); background: none;
  cursor: pointer; font-size: 1.1rem; color: var(--forest);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.wn-btn:hover:not(:disabled) { background: var(--forest); color: white; border-color: var(--forest); }
.wn-btn:disabled { opacity: 0.25; cursor: default; }
.wn-center { text-align: center; }
.wn-week {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 700; color: var(--forest); line-height: 1;
}
.wn-done { font-size: 0.65rem; color: var(--ink-light); letter-spacing: 0.8px; margin-top: 3px; }

.week-prog { height: 4px; background: var(--mist); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
.week-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), var(--gold));
  border-radius: 99px;
  transition: width 0.45s cubic-bezier(.4,0,.2,1);
}

.day-block { margin-bottom: 14px; animation: riseIn 0.4s both; }
.day-label {
  font-size: 0.6rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-light); font-weight: 600; margin-bottom: 7px; padding-left: 2px;
}
.w-card {
  background: var(--white); border-radius: 13px;
  box-shadow: var(--sh-sm); border: 1px solid var(--border); overflow: hidden;
}
.w-session {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid rgba(30,58,47,0.05);
  transition: background 0.15s;
}
.w-session:last-child { border-bottom: none; }
.w-session.my-sess { background: var(--gold-pale); }
.w-session.teach-sess { cursor: pointer; }
.w-session.teach-sess:hover { background: var(--mint-pale); }
.w-session.sess-done { background: var(--mint-pale); }
.w-session.sess-done .w-title,
.w-session.sess-done .w-sub,
.w-session.sess-done .w-time { opacity: 0.45; }

.w-time { font-size: 0.7rem; font-weight: 500; color: var(--ink-light); min-width: 82px; white-space: nowrap; }
.w-badge {
  font-size: 0.57rem; font-weight: 600; letter-spacing: 0.9px;
  text-transform: uppercase; border-radius: 4px; padding: 2px 6px;
  margin-bottom: 3px; display: inline-block;
}
.b-teach   { background: var(--mint-pale); color: var(--forest); border: 1px solid var(--mint); }
.b-lesson  { background: var(--gold-pale); color: #7a5c00; border: 1px solid var(--gold-light); }
.b-league  { background: #eef0fa; color: #3949ab; border: 1px solid #c5caf0; }
.b-softball{ background: #fdecea; color: #b71c1c; border: 1px solid #f5c6c6; }
.w-body { flex: 1; }
.w-title { font-size: 0.86rem; font-weight: 600; color: var(--ink); }
.w-sub   { font-size: 0.7rem; color: var(--ink-light); margin-top: 1px; }

.done-btn {
  background: none; border: 1.5px solid var(--mint); color: var(--sage);
  border-radius: 8px; padding: 5px 12px; font-size: 0.68rem; font-weight: 600;
  cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
.done-btn:hover { background: var(--forest); color: white; border-color: var(--forest); }
.done-btn.undo { border-color: #ccc; color: #bbb; }
.done-btn.undo:hover { background: #aaa; color: white; border-color: #aaa; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header-block">

  <div class="hero-row">
    <div class="hero-left">
      <div class="hero-eyebrow">6 · Week · Package</div>
      <div class="hero-title">Tennis <em>Tracker</em></div>
    </div>
    <div class="weather-inline" id="weather-box">
      <div class="wi-loading">Loading…</div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="st-total">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Collected</div>
      <div class="stat-val green" id="st-collected">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Outstanding</div>
      <div class="stat-val gold" id="st-outstanding">$0</div>
    </div>
  </div>
  <div class="progress-strip"><div class="progress-fill" id="global-progress"></div></div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tab-wrap">
  <button class="tab-btn active" onclick="switchTab('packages')">💰 Packages</button>
  <button class="tab-btn" onclick="switchTab('weekly')">📅 Weekly</button>
</div>

<div class="content">

  <!-- PACKAGES -->
  <div class="view active" id="view-packages">
    <div id="group-cards"></div>
  </div>

  <!-- WEEKLY -->
  <div class="view" id="view-weekly">
    <div class="week-nav-bar">
      <button class="wn-btn" id="prev-wk" onclick="changeWeek(-1)">‹</button>
      <div class="wn-center">
        <div class="wn-week" id="wn-label">Week 1</div>
        <div class="wn-done" id="wn-done">0 of 6 sessions done</div>
      </div>
      <button class="wn-btn" id="next-wk" onclick="changeWeek(1)">›</button>
    </div>
    <div class="week-prog"><div class="week-prog-fill" id="wpb"></div></div>
    <div id="weekly-content"></div>
  </div>

</div>

<script>
// ═══ DATA ═══
const MAX_WEEKS = 6;

const GROUPS = [
  { id:'sylvia', name:'Sylvia Tawil\'s Group',   day:'Sunday',    time:'9:30 AM',       location:"Julie Cohen's Court",   ratePerPerson:50,  students:['Michele Tawil','Rosie Cohen','Janna Braha','Nadine Dweck'] },
  { id:'hannah', name:'School Girls',       day:'Monday',    time:'5:00 PM',       location:"Shirley Jemal's Court", ratePerPerson:60,  students:['Hannah','Lisa','Marilyn','Elizabeth','Camille'] },
  { id:'max',    name:'Max Esses',            day:'Monday',    time:'6:30–7:30 PM',  location:'Private',                      ratePerPerson:120, students:['Max Esses'] },
  { id:'sophia', name:'Sophia Mizrahi Group', day:'Tuesday',   time:'5:30–6:30 PM',  location:'Private',                      ratePerPerson:60,  students:['Sophia Mizrahi','Renee Dushey'] },
  { id:'barbara',name:'Barbara & Camille',    day:'Wednesday', time:'6:00 PM',       location:'Private',                      ratePerPerson:60,  students:['Barbara Harrari','Camille Sakkal'] },
  { id:'ely',    name:'Ely & Friend',         day:'Thursday',  time:'5:30–6:30 PM',  location:'Private',                      ratePerPerson:60,  students:['Ely Tawil','Ely\'s Friend'] }
];

const OTHER = [
  { day:'Monday',    time:'9:00–11:00 AM', badge:'b-lesson',   label:'My Lesson', title:'Elliot Greenberg' },
  { day:'Wednesday', time:'9:00–11:00 AM', badge:'b-softball', label:'Softball',  title:'Softball' },
  { day:'Thursday',  time:'9:00–11:00 AM', badge:'b-league',   label:'League',    title:'League Play' }
];

// ═══ STATE ═══
let state = { paid:{}, sessions:{}, packages:{} };
try { const d = localStorage.getItem('tennis_v3'); if(d) state = {...state, ...JSON.parse(d)}; } catch(e){}

// Initialize packages if not set
GROUPS.forEach(g => {
  if (!state.packages[g.id]) state.packages[g.id] = 6;
});

function save() { try { localStorage.setItem('tennis_v3', JSON.stringify(state)); } catch(e){} }

// ═══ TABS ═══
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===(t==='packages'?0:1)));
  document.getElementById('view-packages').classList.toggle('active', t==='packages');
  document.getElementById('view-weekly').classList.toggle('active', t==='weekly');
}

// ═══ PACKAGES ═══
function renderPackages() {
  const container = document.getElementById('group-cards');
  container.innerHTML = '';

  GROUPS.forEach((g, gi) => {
    const weeks = state.packages[g.id] || 6;
    const ppp = g.ratePerPerson * weeks;
    const groupTotal = g.students.length * ppp;

    const collectedAmt = g.students.reduce((sum,_,si) => {
      const k = `${g.id}-${si}`;
      return sum + (state.paid[k] ? ppp : 0);
    }, 0);
    const allPaid = g.students.every((_,si) => state.paid[`${g.id}-${si}`]);

    const weekDots = Array.from({length:MAX_WEEKS},(_,wi) => {
      const done = !!state.sessions[`week-${wi+1}-${g.id}`];
      const isDisabled = wi+1 > weeks;
      return `<div class="week-pip ${done?'done':''} ${isDisabled?'disabled':''}" title="Week ${wi+1}">${wi+1}</div>`;
    }).join('');

    const studentsHtml = g.students.map((name,si) => {
      const k = `${g.id}-${si}`;
      const isPaid = !!state.paid[k];
      return `
        <div class="student-row ${isPaid?'paid-row':''}" id="srow-${g.id}-${si}">
          <div class="student-main" onclick="toggleStudent('${g.id}',${si})">
            <div class="check-box ${isPaid?'checked':''}">
              <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="student-info">
              <div class="student-name">${name}</div>
              ${isPaid ? `<div class="student-balance">Paid in full</div>` : ''}
            </div>
            ${isPaid ? `<div class="paid-tag">Paid</div>` : ''}
            <div class="student-amt">$${ppp}</div>
          </div>
        </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.animationDelay = (gi*0.05)+'s';
    card.innerHTML = `
      <div class="group-top">
        <div>
          <div class="group-name">${g.name}</div>
          <div class="group-meta">
            <span>${g.day}</span><span>${g.time}</span>
            ${g.location?`<span>${g.location}</span>`:''}
            <span>$${g.ratePerPerson}/wk · ${g.students.length} ${g.students.length===1?'student':'students'}</span>
          </div>
        </div>
        <div class="group-totals">
          <div class="group-pkg-amt">$${groupTotal.toLocaleString()}</div>
          <div class="group-pkg-label">${weeks} weeks</div>
          <div class="group-collected">${allPaid ? '✓ All paid' : `$${collectedAmt.toLocaleString()} collected`}</div>
        </div>
      </div>
      <div class="pkg-selector">
        <div class="pkg-label">📦 Package:</div>
        <button class="pkg-btn ${weeks===2?'active':''}" onclick="setPackage('${g.id}',2)">2 weeks</button>
        <button class="pkg-btn ${weeks===4?'active':''}" onclick="setPackage('${g.id}',4)">4 weeks</button>
        <button class="pkg-btn ${weeks===6?'active':''}" onclick="setPackage('${g.id}',6)">6 weeks</button>
        <button class="pkg-btn ${weeks===8?'active':''}" onclick="setPackage('${g.id}',8)">8 weeks</button>
      </div>
      <div class="students">${studentsHtml}</div>
      <div class="group-weeks"><div class="gw-label">Weeks</div>${weekDots}</div>
    `;
    container.appendChild(card);
  });

  updateStats();
}

function setPackage(gid, weeks) {
  state.packages[gid] = weeks;
  // Clear paid status when package changes
  GROUPS.find(g => g.id === gid).students.forEach((_,si) => {
    delete state.paid[`${gid}-${si}`];
  });
  save();
  renderPackages();
  renderWeekly();
}

function toggleStudent(gid, si) {
  const k = `${gid}-${si}`;
  state.paid[k] = !state.paid[k];
  save();
  renderPackages();
}

function updateStats() {
  let total = 0, collected = 0;
  GROUPS.forEach(g => {
    const weeks = state.packages[g.id] || 6;
    const ppp = g.ratePerPerson * weeks;
    g.students.forEach((_,si) => {
      const k = `${g.id}-${si}`;
      total += ppp;
      if (state.paid[k]) collected += ppp;
    });
  });
  const pct = total > 0 ? collected/total*100 : 0;
  document.getElementById('st-total').textContent = '$'+total.toLocaleString();
  document.getElementById('st-collected').textContent = '$'+collected.toLocaleString();
  document.getElementById('st-outstanding').textContent = '$'+(total-collected).toLocaleString();
  document.getElementById('global-progress').style.width = pct+'%';
}

// ═══ WEEKLY ═══
let currentWeek = 1;
function changeWeek(d) { currentWeek = Math.max(1,Math.min(MAX_WEEKS,currentWeek+d)); renderWeekly(); }

function renderWeekly() {
  document.getElementById('wn-label').textContent = 'Week '+currentWeek;
  document.getElementById('prev-wk').disabled = currentWeek===1;
  document.getElementById('next-wk').disabled = currentWeek===MAX_WEEKS;
  const done = GROUPS.filter(g=> {
    const weeks = state.packages[g.id] || 6;
    return currentWeek <= weeks && state.sessions[`week-${currentWeek}-${g.id}`];
  }).length;
  const eligible = GROUPS.filter(g => (state.packages[g.id] || 6) >= currentWeek).length;
  document.getElementById('wn-done').textContent = done+' of '+eligible+' sessions done';
  document.getElementById('wpb').style.width = (eligible > 0 ? done/eligible*100 : 0)+'%';

  const content = document.getElementById('weekly-content');
  content.innerHTML = '';
  ['Sunday','Monday','Tuesday','Wednesday','Thursday'].forEach(day => {
    const tg = GROUPS.filter(g=>g.day===day);
    const os = OTHER.filter(o=>o.day===day);
    if (!tg.length && !os.length) return;
    const block = document.createElement('div');
    block.className = 'day-block';
    const emoji = day==='Wednesday'?'🥎':'🎾';
    block.innerHTML = `<div class="day-label">${emoji} ${day}</div>`;
    const card = document.createElement('div');
    card.className = 'w-card';
    os.forEach(o => {
      const row = document.createElement('div');
      row.className = 'w-session my-sess';
      row.innerHTML = `<div class="w-time">${o.time}</div><div class="w-body"><div class="w-badge ${o.badge}">${o.label}</div><div class="w-title">${o.title}</div></div>`;
      card.appendChild(row);
    });
    tg.forEach(g => {
      const weeks = state.packages[g.id] || 6;
      if (currentWeek > weeks) return;
      const key = `week-${currentWeek}-${g.id}`;
      const isDone = !!state.sessions[key];
      const row = document.createElement('div');
      row.className = `w-session teach-sess${isDone?' sess-done':''}`;
      row.innerHTML = `
        <div class="w-time">${g.time}</div>
        <div class="w-body">
          <div class="w-badge b-teach">Teaching</div>
          <div class="w-title">${g.name}</div>
          ${g.location?`<div class="w-sub">📍 ${g.location}</div>`:''}
        </div>
        <button class="done-btn ${isDone?'undo':''}" onclick="toggleSession('${key}','${g.id}',event)">${isDone?'Undo':'Done ✓'}</button>`;
      card.appendChild(row);
    });
    block.appendChild(card);
    content.appendChild(block);
  });
}

function toggleSession(key, gid, e) {
  e.stopPropagation();
  state.sessions[key] = !state.sessions[key];
  save(); renderWeekly(); renderPackages();
}

// ═══ WEATHER ═══
async function loadWeather() {
  const box = document.getElementById('weather-box');
  try {
    const lat = 40.7282, lon = -74.3238;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,precipitation,windspeed_10m,weathercode&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=America%2FNew_York`;
    const res = await fetch(url);
    const d = await res.json();
    const c = d.current;
    const temp  = Math.round(c.temperature_2m);
    const feels = Math.round(c.apparent_temperature);
    const wind  = Math.round(c.windspeed_10m);
    const precip = c.precipitation;
    const code  = c.weathercode;

    function wInfo(code) {
      if(code===0)        return {icon:'☀️', label:'Clear'};
      if(code<=2)         return {icon:'⛅', label:'Partly cloudy'};
      if(code===3)        return {icon:'☁️', label:'Overcast'};
      if(code<=49)        return {icon:'🌫️',label:'Fog'};
      if(code<=67)        return {icon:'🌧️',label:'Rain'};
      if(code<=77)        return {icon:'❄️', label:'Snow'};
      if(code<=82)        return {icon:'🌦️',label:'Showers'};
      if(code<=99)        return {icon:'⛈️', label:'Storms'};
      return {icon:'🌡️',label:'Unknown'};
    }
    const {icon,label} = wInfo(code);
    const rain = precip>0.01||(code>=51&&code<=99);
    const windy = wind>25, hot = temp>95;
    let cls, txt;
    if(rain)          { cls='court-bad';   txt='🚫 Stay Inside'; }
    else if(windy||hot){ cls='court-ok';   txt='⚠️ Caution'; }
    else               { cls='court-great';txt='✓ Court Day'; }

    box.innerHTML = `
      <div class="wi-icon">${icon}</div>
      <div>
        <div class="wi-temp">${temp}°</div>
        <div class="wi-desc">${label} · ${feels}° feels</div>
        <div class="wi-badge ${cls}">${txt}</div>
      </div>`;
  } catch(e) {
    box.innerHTML = `<div class="wi-loading">Weather unavailable</div>`;
  }
}

// ═══ INIT ═══
renderPackages();
renderWeekly();
loadWeather();
</script>
